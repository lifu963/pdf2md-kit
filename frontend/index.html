    <script>
      (function () {
        /* ── PDF.js Setup ─────────────────────── */
        var pdfDoc = null;
        var pdfCurrentUrl = null;
        var pdfPageRendering = false;
        var pdfPagePending = null;
        var pdfResizeTimer = null;

        var WORKSPACE_DIVIDER_WIDTH = 14;
        var WORKSPACE_SPLIT_STORAGE_KEY = "pdf_kb_workspace_split_ratio_v1";
        var WORKSPACE_MIN_LEFT_PANE_WIDTH = 320;
        /** 须与 `.workspace { --workspace-min-right-pane }` 数值一致（px）。 */
        var WORKSPACE_MIN_RIGHT_PANE_WIDTH = 600;
        var workspaceSplitRatio = 0.5;
        var workspaceDividerPointerId = null;
        var workspaceResizeActive = false;
        var workspaceResizeSession = null;
        var workspaceResizePendingClientX = null;
        var workspaceResizeFrameId = null;

        if (typeof pdfjsLib !== "undefined") {
          pdfjsLib.GlobalWorkerOptions.workerSrc =
            "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        }

        async function loadPdfDocument(url) {
          if (typeof pdfjsLib === "undefined") return;
          if (pdfDoc && pdfCurrentUrl === url) {
            return;
          }
          if (pdfDoc) {
            await pdfDoc.destroy();
            pdfDoc = null;
            pdfCurrentUrl = null;
            renderPdfPage._surfaceCache = Object.create(null);
            renderPdfPage._cacheOrder = [];
            renderPdfPage._activeCacheKey = null;
          }
          els.pdfCanvas.classList.add("hidden");
          if (state.localPreviewUrl && url !== state.localPreviewUrl) {
            revokeLocalPreviewUrl();
          }
          try {
            var loadingTask = pdfjsLib.getDocument(url);
            pdfDoc = await loadingTask.promise;
            pdfCurrentUrl = url;
            els.pdfPlaceholder.classList.add("hidden");
            await renderPdfPage(state.currentPageNum);
            updatePageSelect();
          } catch (err) {
            log("pdf-load-error", { message: String(err) });
          }
        }

        async function renderPdfPage(pageNum) {
          if (!pdfDoc) return;
          if (pageNum < 1 || pageNum > pdfDoc.numPages) return;
          var containerWidth = els.pdfStage.clientWidth - 56;
          if (containerWidth < 100) containerWidth = 500;
          var outputScale = Math.min(window.devicePixelRatio || 1, 2);
          var cacheKey = String(pageNum) + "|" + Math.round(containerWidth) + "|" + outputScale;
          renderPdfPage._desiredPageNum = pageNum;
          renderPdfPage._desiredCacheKey = cacheKey;
          if (!renderPdfPage._surfaceCache) {
            renderPdfPage._surfaceCache = Object.create(null);
          }
          if (!renderPdfPage._cacheOrder) {
            renderPdfPage._cacheOrder = [];
          }
          var surfaceCache = renderPdfPage._surfaceCache;
          var cacheOrder = renderPdfPage._cacheOrder;
          var MAX_PDF_SURFACE_CACHE = 6;
          function touchCacheEntry(key) {
            var idx = cacheOrder.indexOf(key);
            if (idx >= 0) {
              cacheOrder.splice(idx, 1);
            }
            cacheOrder.push(key);
          }
          function drawSurfaceToViewport(surface) {
            if (!surface) return;
            if (surface === els.pdfCanvas) {
              els.pdfCanvas.classList.remove("hidden");
              els.pdfStage.classList.remove("is-empty");
              return;
            }
            els.pdfCanvas.width = surface.width;
            els.pdfCanvas.height = surface.height;
            els.pdfCanvas.style.width = surface.style.width;
            els.pdfCanvas.style.height = surface.style.height;
            var visibleCtx = els.pdfCanvas.getContext("2d");
            visibleCtx.drawImage(surface, 0, 0);
            els.pdfCanvas.classList.remove("hidden");
            els.pdfStage.classList.remove("is-empty");
          }
          if (surfaceCache[cacheKey]) {
            var cachedSurface = surfaceCache[cacheKey];
            if (pdfPageRendering) {
              var isSameActiveRequest = (
                renderPdfPage._activePageNum === pageNum
                && renderPdfPage._activeCacheKey === cacheKey
              );
              if (!isSameActiveRequest) {
                pdfPagePending = null;
                var runningRenderTask = renderPdfPage._activeRenderTask;
                if (runningRenderTask && typeof runningRenderTask.cancel === "function") {
                  try {
                    runningRenderTask.cancel();
                  } catch (_error) {}
                }
              }
            }
            drawSurfaceToViewport(cachedSurface);
            touchCacheEntry(cacheKey);
            return;
          }
          if (pdfPageRendering) {
            var isSamePageRequest = renderPdfPage._activePageNum === pageNum;
            var isSameRenderKey = renderPdfPage._activeCacheKey === cacheKey;
            if (isSamePageRequest && isSameRenderKey) {
              return;
            }
            pdfPagePending = pageNum;
            var activeRenderTask = renderPdfPage._activeRenderTask;
            if (activeRenderTask && typeof activeRenderTask.cancel === "function") {
              try {
                activeRenderTask.cancel();
              } catch (_error) {}
            }
            return;
          }
          pdfPageRendering = true;
          renderPdfPage._activePageNum = pageNum;
          renderPdfPage._activeCacheKey = cacheKey;
          try {
            var page = await pdfDoc.getPage(pageNum);
            var unscaled = page.getViewport({ scale: 1 });
            var scale = containerWidth / unscaled.width;
            var viewport = page.getViewport({ scale: scale });
            var surfaceWidth = Math.floor(viewport.width * outputScale);
            var surfaceHeight = Math.floor(viewport.height * outputScale);
            var surfaceStyleWidth = Math.floor(viewport.width) + "px";
            var surfaceStyleHeight = Math.floor(viewport.height) + "px";
            var renderCanvas = null;
            var ctx = null;

            if (typeof document !== "undefined" && document.createElement) {
              renderCanvas = document.createElement("canvas");
              if (renderCanvas && renderCanvas.getContext) {
                renderCanvas.width = surfaceWidth;
                renderCanvas.height = surfaceHeight;
                renderCanvas.style.width = surfaceStyleWidth;
                renderCanvas.style.height = surfaceStyleHeight;
                ctx = renderCanvas.getContext("2d");
              }
            }

            if (!ctx) {
              renderCanvas = els.pdfCanvas;
              renderCanvas.width = surfaceWidth;
              renderCanvas.height = surfaceHeight;
              renderCanvas.style.width = surfaceStyleWidth;
              renderCanvas.style.height = surfaceStyleHeight;
              ctx = renderCanvas.getContext("2d");
            }

            ctx.setTransform(outputScale, 0, 0, outputScale, 0, 0);
            var renderTask = page.render({ canvasContext: ctx, viewport: viewport });
            renderPdfPage._activeRenderTask = renderTask;
            await renderTask.promise;

            if (renderCanvas) {
              surfaceCache[cacheKey] = renderCanvas;
              touchCacheEntry(cacheKey);
              while (cacheOrder.length > MAX_PDF_SURFACE_CACHE) {
                var droppedKey = cacheOrder.shift();
                delete surfaceCache[droppedKey];
              }
            }
            var shouldDisplayRenderedSurface = (
              renderPdfPage._desiredPageNum === pageNum
              && renderPdfPage._desiredCacheKey === cacheKey
            );
            if (shouldDisplayRenderedSurface) {
              drawSurfaceToViewport(renderCanvas);
            }
          } catch (err) {
            var isRenderCancelled = !!err && (
              err.name === "RenderingCancelledException"
              || err.name === "AbortException"
            );
            if (!isRenderCancelled) {
              log("pdf-render-error", { page: pageNum, message: String(err) });
            }
          } finally {
            renderPdfPage._activeRenderTask = null;
            renderPdfPage._activePageNum = null;
            renderPdfPage._activeCacheKey = null;
            pdfPageRendering = false;
          }
          if (pdfPagePending !== null) {
            var next = pdfPagePending;
            pdfPagePending = null;
            await renderPdfPage(next);
          }
        }

        /* ── Application State ────────────────── */
        var state = {
          jobId: null,
          job: null,
          historyJobs: [],
          pages: [],
          currentPageNum: 1,
          currentPage: null,
          output: null,
          stream: null,
          isBusy: false,
          pendingUpload: false,
          previewLoading: false,
          previewReady: false,
          preparedFile: null,
          localPreviewUrl: null,
          singlePageTest: { status: "idle", pageNum: null, content: null, error: null },
          pageListSummaryByNum: Object.create(null),
        };
        var pageIndexByNum = Object.create(null);
        var pageOptionByNum = Object.create(null);
        var historyItemByJobId = Object.create(null);
        var jobDonePageSet = new Set();
        var jobFailedPageSet = new Set();
        var pendingUiFlush = null;
        var pendingUiFrameId = null;
        var historyPanelExpanded = false;
        var configPanelExpanded = false;
        var historyDirty = false;
        var historyJobsLoaded = false;
        var MAX_EVENTS_LOG_LINES = 400;
        var eventsLogLines = [];
        var eventsLogDirty = false;
        var eventsLogFrameId = null;
        var eventsLogExpanded = false;
        var eventsLogRenderedCount = 0;
        var eventsLogNeedsFullRender = false;

        /* ── DOM References ───────────────────── */
        var els = {
          appRoot: document.getElementById("app-root"),
          workspace: document.getElementById("workspace"),
          workspaceDivider: document.getElementById("workspace-divider"),
          controlStatTotal: document.getElementById("control-stat-total"),
          controlStatOk: document.getElementById("control-stat-ok"),
          controlStatFail: document.getElementById("control-stat-fail"),
          controlJobStatsWrap: document.getElementById("control-job-stats-wrap"),
          controlExtractionDots: document.getElementById("control-extraction-dots"),
          headerTaskTitle: document.getElementById("header-task-title"),
          headerTaskStatusSymbol: document.getElementById("header-task-status-symbol"),
          headerPageIndicator: document.getElementById("header-page-indicator"),
          headerBackHomeBtn: document.getElementById("header-back-home-btn"),
          configForm: document.getElementById("config-form"),
          modelName: document.getElementById("cfg-model-name"),
          timeout: document.getElementById("cfg-timeout"),
          dpi: document.getElementById("cfg-dpi"),
          concurrency: document.getElementById("cfg-concurrency"),
          maxRetries: document.getElementById("cfg-max-retries"),
          prompt: document.getElementById("cfg-prompt"),
          apiKey: document.getElementById("cfg-api-key"),
          configHasKey: document.getElementById("config-has-key"),
          configTestBtn: document.getElementById("test-config-btn"),
          configTestStatus: document.getElementById("config-test-status"),
          loadConfigBtn: document.getElementById("load-config-btn"),
          restoreInitialConfigBtn: document.getElementById("restore-initial-config-btn"),
          saveConfigBtn: document.getElementById("save-config-btn"),

          pdfDropZone: document.getElementById("workspace-col-left"),
          pdfViewerContainer: document.getElementById("pdf-viewer-container"),
          pdfStage: document.getElementById("pdf-stage"),
          pdfFileInput: document.getElementById("pdf-file-input"),
          uploadPdfBtn: document.getElementById("upload-pdf-btn"),
          uploadPdfHeaderBtn: document.getElementById("upload-pdf-header-btn"),
          pdfFooterNav: document.getElementById("pdf-footer-nav"),
          pdfStatusHint: document.getElementById("pdf-status-hint"),
          pdfStatusHintText: document.getElementById("pdf-status-hint-text"),

          refreshJobBtn: document.getElementById("refresh-job-btn"),
          outputBuildMenuWrap: document.getElementById("build-output-menu-wrap"),
          buildOutputBtn: document.getElementById("build-output-btn"),
          outputBuildMenu: document.getElementById("build-output-menu"),
          startExtractionBtn: document.getElementById("start-extraction-btn"),
          singlePageTestBtn: document.getElementById("single-page-test-btn"),
          statusBadge: document.getElementById("status-badge"),
          statusText: document.getElementById("status-text"),

          progressWrapper: document.getElementById("progress-wrapper"),
          progressFill: document.getElementById("progress-fill"),
          progressLabel: document.getElementById("progress-label"),

          pageSelect: document.getElementById("page-select"),
          prevPageBtn: document.getElementById("prev-page-btn"),
          nextPageBtn: document.getElementById("next-page-btn"),
          pageEditor: document.getElementById("page-editor"),
          pageError: document.getElementById("page-error"),
          pageStatusIndicator: document.getElementById("page-status-indicator"),
          pageStatusText: document.getElementById("page-status-text"),
          retryPageBtn: document.getElementById("retry-page-btn"),
          extractionPhaseActions: document.getElementById("extraction-phase-actions"),
          mergedOutputActions: document.getElementById("merged-output-actions"),

          pageEditorSection: document.getElementById("page-editor-section"),
          outputEditorSection: document.getElementById("output-editor-section"),

          outputEditor: document.getElementById("output-editor"),
          discardOutputBtn: document.getElementById("discard-output-btn"),
          outputDownloadLink: document.getElementById("output-download-link"),

          eventsLog: document.getElementById("events-log"),
          toggleHistoryBtn: document.getElementById("toggle-history-btn"),
          historyPanel: document.getElementById("history-panel"),
          historyCount: document.getElementById("history-count"),
          historyEmpty: document.getElementById("history-empty"),
          historyList: document.getElementById("history-list"),
          toggleConfigBtn: document.getElementById("toggle-config-btn"),
          configPanel: document.querySelector(".config-panel"),

          toggleEventsBtn: document.getElementById("toggle-events-btn"),

          pdfCanvas: document.getElementById("pdf-canvas"),
          pdfPlaceholder: document.getElementById("pdf-placeholder"),
        };
        historyPanelExpanded = !els.historyPanel.classList.contains("collapsed");
        configPanelExpanded = !!(els.configPanel && !els.configPanel.classList.contains("collapsed"));
        eventsLogExpanded = !els.eventsLog.hidden && !els.eventsLog.classList.contains("collapsed");
        setHistoryPanelExpanded(historyPanelExpanded);
        setConfigPanelExpanded(configPanelExpanded);
        setEventsLogExpanded(eventsLogExpanded);

        function schedulePdfRender() {
          if (!pdfDoc) return;
          window.clearTimeout(pdfResizeTimer);
          pdfResizeTimer = window.setTimeout(function () {
            runAction(function () { return renderPdfPage(state.currentPageNum); });
          }, 120);
        }

        function loadPersistedWorkspaceSplitRatio() {
          try {
            if (!window.localStorage) return;
            var raw = localStorage.getItem(WORKSPACE_SPLIT_STORAGE_KEY);
            if (raw === null || raw === "") return;
            var parsed = Number(raw);
            if (!Number.isFinite(parsed) || parsed <= 0 || parsed >= 1) return;
            workspaceSplitRatio = parsed;
          } catch (_e) {}
        }

        function persistWorkspaceSplitRatio() {
          try {
            if (!window.localStorage) return;
            var avail = getWorkspaceAvailableWidth();
            if (avail <= 0) return;
            var clamped = clampWorkspaceSplitRatio(workspaceSplitRatio, avail);
            workspaceSplitRatio = clamped;
            localStorage.setItem(WORKSPACE_SPLIT_STORAGE_KEY, String(clamped));
          } catch (_e) {}
        }

        function getWorkspaceAvailableWidth() {
          if (!els.workspace) return 0;
          return Math.max(0, els.workspace.clientWidth - WORKSPACE_DIVIDER_WIDTH);
        }

        function clampWorkspaceSplitRatio(ratio, availableWidth) {
          if (typeof availableWidth !== "number" || Number.isNaN(availableWidth)) {
            availableWidth = getWorkspaceAvailableWidth();
          }
          if (!availableWidth) return 0.5;
          var minRatio = WORKSPACE_MIN_LEFT_PANE_WIDTH / availableWidth;
          var maxRatio = 1 - WORKSPACE_MIN_RIGHT_PANE_WIDTH / availableWidth;
          /* 相等时恰好为唯一合法比例（如 avail=920 → 320/920）；不可用 0.5，否则 resize 会把 localStorage 写坏 */
          if (minRatio >= maxRatio) return minRatio;
          if (typeof ratio !== "number" || Number.isNaN(ratio)) return 0.5;
          return Math.min(Math.max(ratio, minRatio), maxRatio);
        }

        function updateWorkspaceDividerA11y(ratio, availableWidth) {
          if (!els.workspaceDivider) return;
          els.workspaceDivider.setAttribute("tabindex", "0");
          els.workspaceDivider.removeAttribute("aria-hidden");
          els.workspaceDivider.setAttribute("aria-valuemin", "0");
          els.workspaceDivider.setAttribute("aria-valuemax", "100");
          els.workspaceDivider.setAttribute(
            "aria-valuenow",
            String(
              Math.round(
                clampWorkspaceSplitRatio(
                  typeof ratio === "number" ? ratio : workspaceSplitRatio,
                  availableWidth
                ) * 100
              )
            )
          );
        }

        function applyWorkspaceSplitWithAvailableWidth(availableWidth) {
          if (!els.workspace) return;
          if (availableWidth <= 0) return;
          workspaceSplitRatio = clampWorkspaceSplitRatio(workspaceSplitRatio, availableWidth);
          els.workspace.style.setProperty(
            "--workspace-left-width",
            Math.round(availableWidth * workspaceSplitRatio) + "px"
          );
          updateWorkspaceDividerA11y(workspaceSplitRatio, availableWidth);
        }

        function applyWorkspaceSplit() {
          if (!els.workspace) return;
          applyWorkspaceSplitWithAvailableWidth(getWorkspaceAvailableWidth());
        }

        function createWorkspaceResizeSession() {
          if (!els.workspace) return null;
          var bounds = els.workspace.getBoundingClientRect();
          var availableWidth = Math.max(0, bounds.width - WORKSPACE_DIVIDER_WIDTH);
          if (!availableWidth) return null;
          return {
            left: bounds.left,
            width: bounds.width,
            availableWidth: availableWidth,
          };
        }

        function applyWorkspaceResizeAtClientX(clientX) {
          if (!workspaceResizeSession) return;
          var leftWidth = clientX - workspaceResizeSession.left - (WORKSPACE_DIVIDER_WIDTH / 2);
          workspaceSplitRatio = clampWorkspaceSplitRatio(
            leftWidth / workspaceResizeSession.availableWidth,
            workspaceResizeSession.availableWidth
          );
          applyWorkspaceSplitWithAvailableWidth(workspaceResizeSession.availableWidth);
        }

        function flushWorkspaceResizeFrame() {
          workspaceResizeFrameId = null;
          if (workspaceResizePendingClientX === null) return;
          var clientX = workspaceResizePendingClientX;
          workspaceResizePendingClientX = null;
          applyWorkspaceResizeAtClientX(clientX);
        }

        function updateWorkspaceSplitFromClientX(clientX) {
          if (!workspaceResizeActive || !els.workspace) return;
          if (!workspaceResizeSession) {
            workspaceResizeSession = createWorkspaceResizeSession();
          }
          if (!workspaceResizeSession) return;
          workspaceResizePendingClientX = clientX;
          if (workspaceResizeFrameId !== null) return;
          workspaceResizeFrameId = window.requestAnimationFrame(flushWorkspaceResizeFrame);
        }

        function flushPendingWorkspaceResize() {
          if (workspaceResizeFrameId !== null && window.cancelAnimationFrame) {
            window.cancelAnimationFrame(workspaceResizeFrameId);
            workspaceResizeFrameId = null;
          }
          if (workspaceResizePendingClientX === null) return;
          var clientX = workspaceResizePendingClientX;
          workspaceResizePendingClientX = null;
          applyWorkspaceResizeAtClientX(clientX);
        }

        function stopWorkspaceResize() {
          if (!workspaceResizeActive) return;
          flushPendingWorkspaceResize();
          workspaceResizeActive = false;
          workspaceResizeSession = null;
          document.body.classList.remove("workspace-resizing");
          if (
            workspaceDividerPointerId !== null &&
            els.workspaceDivider &&
            els.workspaceDivider.releasePointerCapture &&
            els.workspaceDivider.hasPointerCapture &&
            els.workspaceDivider.hasPointerCapture(workspaceDividerPointerId)
          ) {
            els.workspaceDivider.releasePointerCapture(workspaceDividerPointerId);
          }
          workspaceDividerPointerId = null;
          persistWorkspaceSplitRatio();
          schedulePdfRender();
        }

        function nudgeWorkspaceSplit(stepDirection) {
          var availableWidth = getWorkspaceAvailableWidth();
          if (availableWidth <= 0) return;
          workspaceSplitRatio = clampWorkspaceSplitRatio(workspaceSplitRatio + ((stepDirection * 28) / availableWidth));
          applyWorkspaceSplit();
          persistWorkspaceSplitRatio();
          schedulePdfRender();
        }

        function getHeaderTaskTitle() {
          if (state.job && state.job.pdf_name) return String(state.job.pdf_name);
          if (state.jobId && Array.isArray(state.historyJobs)) {
            for (var hi = 0; hi < state.historyJobs.length; hi++) {
              var hj = state.historyJobs[hi];
              if (hj && hj.job_id === state.jobId && hj.pdf_name) return String(hj.pdf_name);
            }
          }
          return state.jobId ? "任务" : "";
        }

        function jobStatusSymbolHtml(status) {
          if (status === "failed") return "✕";
          if (status === "building") return '<span class="dots" aria-hidden="true"></span>';
          if (status === "extracting" || status === "idle" || status === "uploading" || status === "previewing") {
            return '<span class="blink">…</span>';
          }
          return "◆";
        }

        function updateWorkspaceHeaderChrome() {
          if (!els.headerTaskTitle || !els.headerTaskStatusSymbol || !els.headerPageIndicator) return;
          if (!state.jobId) {
            els.headerTaskTitle.textContent = "";
            els.headerTaskStatusSymbol.innerHTML = "";
            els.headerPageIndicator.textContent = "";
            return;
          }
          els.headerTaskTitle.textContent = getHeaderTaskTitle();
          var st = state.job ? state.job.status : "idle";
          els.headerTaskStatusSymbol.innerHTML = jobStatusSymbolHtml(st);
          var total = getPageNavigationTotal();
          if (total <= 0) {
            els.headerPageIndicator.textContent = "";
            return;
          }
          var cur = normalizePageNum(state.currentPageNum);
          var c = cur !== null ? cur : 1;
          els.headerPageIndicator.textContent = "页 " + c + " / " + total;
        }

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\"/g, "&quot;");
        }

        function firstLineSnippet(text) {
          if (typeof text !== "string") return "";
          var lines = text.split(/\r?\n/);
          for (var li = 0; li < lines.length; li++) {
            var t = lines[li].trim();
            if (t.length > 0) {
              if (t.length > 40) return t.slice(0, 37) + "…";
              return t;
            }
          }
          return "";
        }

        function rememberPageLineFromContent(pageNum, content) {
          var n = normalizePageNum(pageNum);
          if (n === null) return;
          var snip = firstLineSnippet(content || "");
          if (snip) state.pageListSummaryByNum[n] = snip;
        }

        async function fetchPageSummarySnippet(pageNum) {
          if (!state.jobId) return;
          var snapshotJobId = state.jobId;
          var n = normalizePageNum(pageNum);
          if (n === null) return;
          try {
            var page = await requestJson(
              "/api/jobs/" + encodeURIComponent(snapshotJobId) + "/pages/" + n
            );
            if (state.jobId !== snapshotJobId) return;
            var blob = "";
            if (page && typeof page.content === "string" && page.content.length) {
              blob = page.content;
            } else if (page && typeof page.error === "string" && page.error.length) {
              blob = page.error;
            }
            rememberPageLineFromContent(n, blob);
          } catch (err) {
            log("page-summary-hydrate-failed", { page_num: n, message: String(err) });
          }
        }

        async function hydratePageListSummaries() {
          if (!state.jobId || !Array.isArray(state.pages)) return;
          var snapshotJobId = state.jobId;
          for (var i = 0; i < state.pages.length; i++) {
            if (state.jobId !== snapshotJobId) return;
            var p = state.pages[i];
            if (p.status !== "done" && p.status !== "failed") continue;
            if (state.pageListSummaryByNum[p.page_num]) continue;
            await fetchPageSummarySnippet(p.page_num);
          }
        }

        async function goBackHomeFromHeader() {
          if (state.isBusy) {
            window.alert("当前操作进行中，请稍后再返回首页。");
            return;
          }
          if (state.pendingUpload || state.previewLoading) {
            window.alert("正在处理 PDF，请稍后再返回首页。");
            return;
          }
          await resetActiveWorkspace();
        }

        /* ── Status Label Map ─────────────────── */
        var STATUS_LABELS = {
          idle: "空闲",
          extracting: "提取中",
          extracted: "提取完成",
          building: "构建中",
          uploading: "上传中",
          previewing: "预览加载中",
          prepared: "待开始",
          ready: "就绪",
          failed: "失败",
        };

        /* ── Logging ──────────────────────────── */
        function isEventsLogNearBottom() {
          if (!els.eventsLog) return true;
          return (els.eventsLog.scrollTop + els.eventsLog.clientHeight + 24) >= els.eventsLog.scrollHeight;
        }

        function renderEventsLog() {
          if (!els.eventsLog || !eventsLogDirty) return;
          var shouldStickBottom = isEventsLogNearBottom();
          if (eventsLogNeedsFullRender || eventsLogRenderedCount > eventsLogLines.length) {
            rewriteEventsLogFromBuffer();
          } else if (eventsLogRenderedCount < eventsLogLines.length) {
            appendEventsLogTail(eventsLogRenderedCount);
          }
          eventsLogDirty = false;
          if (shouldStickBottom) {
            els.eventsLog.scrollTop = els.eventsLog.scrollHeight;
          }
        }

        function rewriteEventsLogFromBuffer() {
          var rendered = eventsLogLines.join("\n");
          if (rendered) {
            rendered += "\n";
          }
          els.eventsLog.textContent = rendered;
          eventsLogRenderedCount = eventsLogLines.length;
          eventsLogNeedsFullRender = false;
        }

        function appendEventsLogTail(fromIndex) {
          if (fromIndex >= eventsLogLines.length) return;
          var appended = eventsLogLines.slice(fromIndex).join("\n");
          if (!appended) return;
          appended += "\n";
          if (typeof els.eventsLog.insertAdjacentText === "function") {
            els.eventsLog.insertAdjacentText("beforeend", appended);
          } else {
            var existingText = typeof els.eventsLog.textContent === "string" ? els.eventsLog.textContent : "";
            els.eventsLog.textContent = existingText + appended;
          }
          eventsLogRenderedCount = eventsLogLines.length;
        }

        function flushEventsLog() {
          eventsLogFrameId = null;
          if (!eventsLogExpanded) return;
          renderEventsLog();
        }

        function scheduleEventsLogFlush(forceImmediate) {
          if (!eventsLogExpanded && !forceImmediate) return;
          if (!eventsLogDirty && !forceImmediate) return;
          if (eventsLogFrameId !== null) return;
          if (forceImmediate || !window.requestAnimationFrame) {
            flushEventsLog();
            return;
          }
          eventsLogFrameId = window.requestAnimationFrame(function () {
            flushEventsLog();
          });
        }

        function setEventsLogExpanded(expanded) {
          eventsLogExpanded = !!expanded;
          syncPanelCollapsedState(els.eventsLog, !eventsLogExpanded);
          els.eventsLog.classList.toggle("expanded", eventsLogExpanded);
          els.toggleEventsBtn.classList.toggle("expanded", eventsLogExpanded);
          if (els.toggleEventsBtn) {
            els.toggleEventsBtn.setAttribute("aria-expanded", eventsLogExpanded ? "true" : "false");
          }
          if (!eventsLogExpanded) {
            if (eventsLogFrameId !== null && window.cancelAnimationFrame) {
              window.cancelAnimationFrame(eventsLogFrameId);
            }
            eventsLogFrameId = null;
            return;
          }
          scheduleEventsLogFlush(false);
        }

        function log(message, payload) {
          var line = payload === undefined ? message : message + " " + JSON.stringify(payload);
          var now = new Date().toISOString();
          eventsLogLines.push("[" + now + "] " + line);
          if (eventsLogLines.length > MAX_EVENTS_LOG_LINES) {
            var overflow = eventsLogLines.length - MAX_EVENTS_LOG_LINES;
            eventsLogLines.splice(0, overflow);
            eventsLogRenderedCount = Math.max(eventsLogRenderedCount - overflow, 0);
            eventsLogNeedsFullRender = true;
          }
          eventsLogDirty = true;
          scheduleEventsLogFlush(false);
        }

        function normalizeBuildMergeMode(value) {
          if (value === "separator" || value === "separator_with_page_number") {
            return value;
          }
          return "direct";
        }

        function closeBuildOutputMenu() {
          els.outputBuildMenu.classList.add("hidden");
        }

        /* ── API helpers ──────────────────────── */
        function apiErrorText(responseBody, fallback) {
          if (responseBody && responseBody.detail && responseBody.detail.code) {
            return responseBody.detail.code + ": " + responseBody.detail.message;
          }
          return fallback;
        }

        async function requestJson(path, init) {
          var response = await fetch(path, init);
          var text = await response.text();
          var payload = text ? JSON.parse(text) : null;
          if (!response.ok) {
            var error = new Error(apiErrorText(payload, "HTTP " + response.status));
            if (payload && payload.detail) {
              error.appError = {
                code: typeof payload.detail.code === "string" ? payload.detail.code : "",
                message: typeof payload.detail.message === "string" ? payload.detail.message : "",
                details: payload.detail.details || null,
              };
            }
            error.status = response.status;
            throw error;
          }
          return payload;
        }

        function closeStream() {
          if (!state.stream) return;
          state.stream.close();

        function resetSinglePageTest() {
          state.singlePageTest = { status: "idle", pageNum: null, content: null, error: null };

        /**
         * 渲染单页测试 running / done / failed：顶栏 #status-badge / #status-text 展示标题；
         * 编辑器区不写重复标题 (#page-status-indicator 保持隐藏)。纯视图函数，抽离后可单测。
         */
        function renderSinglePageTestView(test) {
          if (!test || test.status === "idle") return;
          /* 标题只在顶栏 #status-text 展示，避免正文区 (#page-status-indicator) 重复一行 */
          if (els.pageStatusIndicator && els.pageStatusIndicator.classList) {
            els.pageStatusIndicator.classList.add("hidden");
          }
          if (els.pageStatusText) els.pageStatusText.textContent = "";
          var pageNum = Number.isInteger(test.pageNum) && test.pageNum > 0 ? test.pageNum : 1;
          if (test.status === "running") {
            els.statusBadge.className = "status-chip status-extracting";
            els.statusText.textContent = "测试中 · 第 " + pageNum + " 页";
            if (els.statusText && els.statusText.classList) els.statusText.classList.add("blink");
            els.pageEditor.value = "";
            els.pageEditor.readOnly = true;
            els.pageEditor.disabled = true;
            els.pageError.textContent = "";
            return;
          }
          if (test.status === "done") {
            els.statusBadge.className = "status-chip status-done";
            els.statusText.textContent = "测试结果 · 第 " + pageNum + " 页";
            if (els.statusText && els.statusText.classList) els.statusText.classList.remove("blink");
            els.pageEditor.value = typeof test.content === "string" ? test.content : "";
            els.pageEditor.readOnly = true;
            els.pageEditor.disabled = true;
            els.pageError.textContent = "";
            return;
          }
          // failed
          els.statusBadge.className = "status-chip status-failed";
          els.statusText.textContent = "测试失败 · 第 " + pageNum + " 页";
          if (els.statusText && els.statusText.classList) els.statusText.classList.remove("blink");
          els.pageEditor.value = "";
          els.pageEditor.readOnly = true;
          els.pageEditor.disabled = true;
          var message = (test.error && typeof test.error.message === "string")
            ? test.error.message
            : "单页测试失败。";
          var code = (test.error && typeof test.error.code === "string") ? test.error.code : "";
          if (code === "LLM_AUTH_FAILED" || code === "CONFIG_MISSING_API_KEY") {
            message = message + "（请去配置面板配置 API Key）";
          }
          els.pageError.textContent = message;
        }

        }

        function getWorkspaceStatus() {
          if (state.pendingUpload) return "uploading";
          if (state.job) return state.job.status;
          if (state.previewLoading) return "previewing";
          if (state.previewReady) return "prepared";
