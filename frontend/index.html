        /* ── UI State Updates ─────────────────── */
        function updateControlAvailability() {
          if (els.appRoot) {
            els.appRoot.classList.toggle("has-job", !!state.jobId);
          }
          var status = getWorkspaceStatus();
          var extractionIncomplete =
            state.job
            && Array.isArray(state.job.failed_pages)
            && state.job.failed_pages.length > 0;
          var statusBadgeLabel = STATUS_LABELS[status] || status;
          if (
            state.job
            && state.job.status === "extracting"
            && extractionIncomplete
            && state.job.processed_count === state.job.total_pages
          ) {
            statusBadgeLabel = "提取未完成（含失败页）";
          }
          var isReady = status === "ready";
          var hasPreparedFile = !!state.preparedFile;
          var isFileOperationPending = state.pendingUpload || state.previewLoading;
          var singlePageTestStatus = state.singlePageTest && state.singlePageTest.status
            ? state.singlePageTest.status
            : "idle";
          var singlePageTestRunning = singlePageTestStatus === "running";
          var canWritePages = state.job && state.pages.length > 0 && status !== "building" && status !== "ready" && !state.isBusy;
          var currentPageNumValue = Number(state.currentPageNum);
          var currentPageNum = Number.isInteger(currentPageNumValue) && currentPageNumValue > 0
            ? currentPageNumValue
            : null;
          var currentPageStatus = "";
          if (currentPageNum !== null && Array.isArray(state.pages)) {
            for (var pageStatusIndex = 0; pageStatusIndex < state.pages.length; pageStatusIndex++) {
              var pageSummary = state.pages[pageStatusIndex];
              if (pageSummary && pageSummary.page_num === currentPageNum) {
                currentPageStatus = pageSummary.status;
                break;
              }
            }
          }
          if (!currentPageStatus && state.currentPage && state.currentPage.page_num === currentPageNum) {
            currentPageStatus = state.currentPage.status;
          }
          var canRetryCurrentPage = canWritePages
            && (status === "extracting" || status === "extracted")
            && (currentPageStatus === "done" || currentPageStatus === "failed");
          var canBuild =
            state.job
            && status === "extracted"
            && !extractionIncomplete
            && !state.isBusy;
          var canStartExtraction = !state.jobId && !state.job && hasPreparedFile && state.previewReady && !isFileOperationPending && !state.isBusy && !singlePageTestRunning;
          var canSinglePageTest = !state.jobId && !state.job && hasPreparedFile && state.previewReady && !isFileOperationPending && !state.isBusy && !singlePageTestRunning;
          var canDiscardOutput = state.job && isReady && !state.isBusy;
          var canSaveOutput = state.job && isReady && !state.isBusy;

          var isSinglePageTestViewActive = !state.jobId && singlePageTestStatus !== "idle";

          /* Status badge */
          if (isSinglePageTestViewActive) {
            /* 单页测试结果占据状态徽标；后续的 page-editor 渲染也改写 */
            renderSinglePageTestView(state.singlePageTest);
          } else {
            els.statusBadge.className = "status-chip status-" + status;
            els.statusText.textContent = statusBadgeLabel;
            if (els.statusText && els.statusText.classList) els.statusText.classList.remove("blink");
            /* 避免单页测试把编辑器永久锁成只读；常规工作区始终由 disabled 控制可写性。 */
            els.pageEditor.readOnly = false;
            if (typeof updatePageStatusIndicator === "function") {
              updatePageStatusIndicator();
            }
          }
          updateProgress();

          /* Workspace mode switching */
          if (isReady) {
            els.pageEditorSection.classList.add("hidden");
            els.outputEditorSection.classList.remove("hidden");
            if (els.extractionPhaseActions) {
              els.extractionPhaseActions.classList.add("hidden");
              els.extractionPhaseActions.setAttribute("aria-hidden", "true");
            }
            if (els.mergedOutputActions) {
              els.mergedOutputActions.classList.remove("hidden");
              els.mergedOutputActions.setAttribute("aria-hidden", "false");
            }
          } else {
            els.pageEditorSection.classList.remove("hidden");
            els.outputEditorSection.classList.add("hidden");
            if (els.extractionPhaseActions) {
              els.extractionPhaseActions.classList.remove("hidden");
              els.extractionPhaseActions.setAttribute("aria-hidden", "false");
            }
            if (els.mergedOutputActions) {
              els.mergedOutputActions.classList.add("hidden");
              els.mergedOutputActions.setAttribute("aria-hidden", "true");
            }
          }

          /* Build button: visible when merge is allowed (extracted & no failures), or building */
          var showBuild =
            state.job
            && !extractionIncomplete
            && (status === "extracted" || status === "building");
          els.outputBuildMenuWrap.style.display = showBuild ? "" : "none";
          els.buildOutputBtn.disabled = !canBuild;
          if (!showBuild || !canBuild) closeBuildOutputMenu();

          /* Button states */
          els.startExtractionBtn.style.display = state.jobId ? "none" : "";
          els.startExtractionBtn.disabled = !canStartExtraction;
          els.singlePageTestBtn.style.display = state.jobId ? "none" : "";
          els.singlePageTestBtn.disabled = !canSinglePageTest;
          els.retryPageBtn.disabled = !canRetryCurrentPage;
          els.discardOutputBtn.disabled = !canDiscardOutput;
          els.pageEditor.disabled = isSinglePageTestViewActive ? true : !canWritePages;
          els.outputEditor.disabled = !canSaveOutput;
          els.uploadPdfBtn.disabled = isFileOperationPending;
          els.uploadPdfHeaderBtn.disabled = isFileOperationPending;
          els.pdfFileInput.disabled = isFileOperationPending;
          els.refreshJobBtn.disabled = !state.jobId || isFileOperationPending;
          els.loadConfigBtn.disabled = state.isBusy || isFileOperationPending;
          els.restoreInitialConfigBtn.disabled = state.isBusy || isFileOperationPending;
          els.saveConfigBtn.disabled = state.isBusy || isFileOperationPending;
          els.configTestBtn.disabled = state.isBusy || isFileOperationPending;

          var statTotal = state.job ? (state.job.total_pages || 0) : 0;
          if (els.controlStatTotal) els.controlStatTotal.textContent = String(statTotal);
          if (els.controlStatOk) els.controlStatOk.textContent = String(jobDonePageSet.size);
          if (els.controlStatFail) els.controlStatFail.textContent = String(jobFailedPageSet.size);
          if (els.controlJobStatsWrap) {
            els.controlJobStatsWrap.classList.add("hidden");
            els.controlJobStatsWrap.setAttribute("aria-hidden", "true");
          }
          if (els.controlExtractionDots) {
            els.controlExtractionDots.classList.toggle("is-visible", status === "building");
          }

          var canDownloadOut = state.job && isReady && !state.isBusy;
          if (els.outputDownloadLink) {
            els.outputDownloadLink.classList.toggle("is-disabled", !canDownloadOut);
            if (canDownloadOut && state.jobId) {
              els.outputDownloadLink.href = "/api/jobs/" + encodeURIComponent(state.jobId) + "/output/download";
            } else {
              els.outputDownloadLink.href = "#";
            }
          }

          if (typeof updateWorkspaceHeaderChrome === "function") updateWorkspaceHeaderChrome();
          refreshHistoryActionAvailability();
        }

        function updateProgress() {
          if (!state.job || state.job.status === "idle" || state.job.status === "ready") {
            els.progressWrapper.style.display = "none";
            return;
          }
          var total = state.job.total_pages || 0;
          var processed = state.job.processed_count || 0;
          if (total <= 0) {
            els.progressWrapper.style.display = "none";
            return;
          }
          els.progressWrapper.style.display = "flex";
          var pct = Math.round((processed / total) * 100);
          els.progressFill.style.width = pct + "%";
          els.progressFill.className = processed >= total ? "progress-fill complete" : "progress-fill";
          els.progressLabel.textContent = processed + "/" + total;
        }

        function normalizePageNum(value) {
          var pageNum = Number(value);
          return Number.isInteger(pageNum) && pageNum > 0 ? pageNum : null;
        }

        function normalizePageSummaries(pages) {
          if (!Array.isArray(pages)) return [];
          var normalized = [];
          for (var i = 0; i < pages.length; i++) {
            var item = pages[i];
            var pageNum = normalizePageNum(item && item.page_num);
            if (pageNum === null) continue;
            normalized.push({ page_num: pageNum, status: item.status });
          }
          normalized.sort(function (a, b) { return a.page_num - b.page_num; });
          return normalized;
        }

        function syncJobProgressBucket(pageNum, previousStatus, nextStatus) {
          if (previousStatus === "done") jobDonePageSet.delete(pageNum);
          else if (previousStatus === "failed") jobFailedPageSet.delete(pageNum);
          if (nextStatus === "done") jobDonePageSet.add(pageNum);
          else if (nextStatus === "failed") jobFailedPageSet.add(pageNum);
        }

        function replacePageSummaries(pages) {
          state.pages = normalizePageSummaries(pages);
          var nextNums = Object.create(null);
          for (var pi = 0; pi < state.pages.length; pi++) {
            nextNums[state.pages[pi].page_num] = true;
          }
          var prev = state.pageListSummaryByNum;
          var merged = Object.create(null);
          for (var key in prev) {
            if (!Object.prototype.hasOwnProperty.call(prev, key)) continue;
            var kn = Number(key);
            if (nextNums[kn]) merged[kn] = prev[key];
          }
          state.pageListSummaryByNum = merged;
          pageIndexByNum = Object.create(null);
          pageOptionByNum = Object.create(null);
          jobDonePageSet = new Set();
          jobFailedPageSet = new Set();
          for (var i = 0; i < state.pages.length; i++) {
            var summary = state.pages[i];
            pageIndexByNum[summary.page_num] = i;
            syncJobProgressBucket(summary.page_num, null, summary.status);
          }
        }

        function applyPageSummaryDelta(pageNum, status) {
          var index = pageIndexByNum[pageNum];
          var previousStatus = null;
          if (typeof index === "number") {
            previousStatus = state.pages[index].status;
            if (previousStatus !== status) {
              state.pages[index] = { page_num: pageNum, status: status };
              syncJobProgressBucket(pageNum, previousStatus, status);
            }
            return { changed: previousStatus !== status, previousStatus: previousStatus };
          }
          var insertIndex = state.pages.length;
          for (var i = 0; i < state.pages.length; i++) {
            if (state.pages[i].page_num > pageNum) {
              insertIndex = i;
              break;
            }
          }
          state.pages.splice(insertIndex, 0, { page_num: pageNum, status: status });
          for (var j = insertIndex; j < state.pages.length; j++) {
            pageIndexByNum[state.pages[j].page_num] = j;
          }
          syncJobProgressBucket(pageNum, null, status);
          return { changed: true, previousStatus: null };
        }

        function historySortValue(value) {
          var timestamp = Date.parse(value || "");
          return Number.isNaN(timestamp) ? 0 : timestamp;
        }

        function normalizeHistoryJobs(items) {
          if (!Array.isArray(items)) return [];
          var normalized = [];
          for (var i = 0; i < items.length; i++) {
            var item = items[i] || {};
            if (!item.job_id) continue;
            var totalPages = Number(item.total_pages);
            var processedCount = Number(item.processed_count);
            var pdfName = typeof item.pdf_name === "string" ? item.pdf_name.trim() : "";
            normalized.push({
              job_id: String(item.job_id),
              pdf_name: pdfName || "未命名 PDF",
              status: typeof item.status === "string" ? item.status : "failed",
              total_pages: Number.isFinite(totalPages) && totalPages > 0 ? totalPages : 0,
              processed_count: Number.isFinite(processedCount) && processedCount >= 0 ? processedCount : 0,
              created_at: typeof item.created_at === "string" ? item.created_at : "",
              updated_at: typeof item.updated_at === "string" ? item.updated_at : "",
            });
          }
          normalized.sort(function (a, b) {
            return historySortValue(b.updated_at) - historySortValue(a.updated_at);
          });
          return normalized;
        }

        function formatHistoryTimestamp(value) {
          if (!value) return "未知时间";
          var parsed = new Date(value);
          if (Number.isNaN(parsed.getTime())) return value;
          return parsed.toLocaleString("zh-CN", { hour12: false });
        }

        function canDeleteHistoryJob(item) {
          return !!item && item.status !== "extracting" && item.status !== "building";
        }

        function isHistoryActionBlocked() {
          return state.pendingUpload || state.previewLoading || state.isBusy;
        }

        function syncPanelCollapsedState(panel, collapsed) {
          if (!panel) return;
          var shouldCollapse = !!collapsed;
          panel.classList.toggle("collapsed", shouldCollapse);
          panel.hidden = shouldCollapse;
        }

        function setHistoryPanelExpanded(expanded) {
          historyPanelExpanded = !!expanded;
          syncPanelCollapsedState(els.historyPanel, !historyPanelExpanded);
          if (els.toggleHistoryBtn && !els.toggleHistoryBtn.classList.contains("hidden")) {
            els.toggleHistoryBtn.classList.toggle("active", historyPanelExpanded);
          }
        }

        function setConfigPanelExpanded(expanded) {
          configPanelExpanded = !!expanded;
          if (els.configPanel) {
            syncPanelCollapsedState(els.configPanel, !configPanelExpanded);
          }
          if (els.toggleConfigBtn) {
            els.toggleConfigBtn.classList.toggle("active", configPanelExpanded);
          }
        }

        function applyHistoryJobActionAvailability(item, article) {
          if (!item || !article) return;
          var openBtn = article.querySelector('[data-history-action="open"]');
          if (openBtn) {
            openBtn.disabled = isHistoryActionBlocked();
          }
          var deleteBtn = article.querySelector('[data-history-action="delete"]');
          if (!deleteBtn) return;
          var deletable = canDeleteHistoryJob(item);
          deleteBtn.disabled = !deletable || isHistoryActionBlocked();
          deleteBtn.title = deletable ? "删除该历史任务" : "进行中的任务暂不可删除";
        }

        function refreshHistoryActionAvailability() {
          if (!historyPanelExpanded) return;
          for (var i = 0; i < state.historyJobs.length; i++) {
            var item = state.historyJobs[i];
            var article = historyItemByJobId[item.job_id];
            if (!article || !article.parentNode) continue;
            applyHistoryJobActionAvailability(item, article);
          }
        }

        function createHistoryStatusSymbol(status) {
          var el = document.createElement("span");
          el.className = "history-status-symbol";
          if (status === "failed") {
            el.textContent = "\u2715";
            el.setAttribute("aria-label", "\u5931\u8d25");
            return el;
          }
          if (
            status === "extracting"
            || status === "building"
            || status === "uploading"
            || status === "previewing"
          ) {
            el.setAttribute("aria-label", "\u5904\u7406\u4e2d");
            var blink = document.createElement("span");
            blink.className = "history-work-indicator blink";
            blink.setAttribute("aria-hidden", "true");
            el.appendChild(blink);
            return el;
          }
          el.textContent = "\u25c6";
          el.setAttribute("aria-label", STATUS_LABELS[status] || status);
          return el;
        }

        function renderHistoryJobItem(item) {
          var isCurrent = state.jobId === item.job_id;
          var deletable = canDeleteHistoryJob(item);
          var article = document.createElement("article");
          article.classList.add("history-item");
          if (isCurrent) {
            article.classList.add("history-item-active");
          }
          if (item.status === "failed") {
            article.classList.add("history-item-failed");
          }
          article.setAttribute("data-history-job-id", item.job_id);

          var main = document.createElement("div");
          main.className = "history-item-main";

          var heading = document.createElement("div");
          heading.className = "history-item-heading";
          heading.appendChild(createHistoryStatusSymbol(item.status));
          var title = document.createElement("div");
          title.className = "history-item-title";
          title.textContent = item.pdf_name;
          heading.appendChild(title);
          if (isCurrent) {
            var currentTag = document.createElement("span");
            currentTag.className = "history-item-current";
            currentTag.textContent = "\u5f53\u524d";
            heading.appendChild(currentTag);
          }
          main.appendChild(heading);

          var meta = document.createElement("div");
          meta.className = "history-item-meta";
          var time = document.createElement("span");
          time.className = "history-item-detail";
          time.textContent = formatHistoryTimestamp(item.created_at);
          meta.appendChild(time);

          if (!deletable) {
            var warning = document.createElement("span");
            warning.className = "history-item-warning";
            warning.textContent = "\u8fdb\u884c\u4e2d\u4efb\u52a1\u6682\u4e0d\u53ef\u5220\u9664";
            meta.appendChild(warning);
          }

          main.appendChild(meta);

          var actions = document.createElement("div");
          actions.className = "history-item-actions";

          var openBtn = document.createElement("button");
          openBtn.type = "button";
          openBtn.className = "pixel-btn-sm";
          openBtn.textContent = isCurrent ? "\u91cd\u65b0\u52a0\u8f7d" : "\u8fdb\u5165";
          openBtn.disabled = false;
          openBtn.setAttribute("data-history-action", "open");
          openBtn.setAttribute("data-job-id", item.job_id);
          actions.appendChild(openBtn);

          var deleteBtn = document.createElement("button");
          deleteBtn.type = "button";
          deleteBtn.className = "pixel-btn-sm";
          deleteBtn.textContent = "\u5220\u9664";
          deleteBtn.disabled = !deletable;
          deleteBtn.title = deletable ? "\u5220\u9664\u8be5\u5386\u53f2\u4efb\u52a1" : "\u8fdb\u884c\u4e2d\u7684\u4efb\u52a1\u6682\u4e0d\u53ef\u5220\u9664";
          deleteBtn.setAttribute("data-history-action", "delete");
          deleteBtn.setAttribute("data-job-id", item.job_id);
          actions.appendChild(deleteBtn);

          article.appendChild(main);
          article.appendChild(actions);
          applyHistoryJobActionAvailability(item, article);
          return article;
        }

        function renderHistoryList() {
          state.historyJobs = normalizeHistoryJobs(state.historyJobs);
          historyItemByJobId = Object.create(null);
          historyDirty = false;
          els.historyCount.textContent = state.historyJobs.length + " 条";
          els.historyList.innerHTML = "";

          if (state.historyJobs.length === 0) {
            els.historyEmpty.classList.remove("hidden");
            els.historyList.classList.add("hidden");
            return;
          }

          els.historyEmpty.classList.add("hidden");
          els.historyList.classList.remove("hidden");

          for (var i = 0; i < state.historyJobs.length; i++) {
            var item = state.historyJobs[i];
            var article = renderHistoryJobItem(item);
            historyItemByJobId[item.job_id] = article;
            els.historyList.appendChild(article);
          }
        }

        async function loadHistoryJobs() {
          state.historyJobs = normalizeHistoryJobs(await requestJson("/api/jobs"));
          historyJobsLoaded = true;
          renderHistoryList();
        }

        async function refreshHistoryPanelOnExpand() {
          if (!historyPanelExpanded) return;
          if (!historyJobsLoaded || historyDirty) {
            await loadHistoryJobs();
            return;
          }
          refreshHistoryActionAvailability();
        }

        async function syncHistoryPanelOnDemand(forceSync) {
          if (forceSync) {
            historyDirty = true;
          }
          if (!historyPanelExpanded) return;
          await refreshHistoryPanelOnExpand();
        }

        function updateCurrentHistoryJobState(patch) {
          if (!state.jobId) return;
          var item = state.historyJobs.find(function (entry) { return entry.job_id === state.jobId; });
          if (!item) {
            historyDirty = true;
            return;
          }
          var changed = false;
          if (patch.status && item.status !== patch.status) {
            item.status = patch.status;
            changed = true;
          }
          if (typeof patch.total_pages === "number" && item.total_pages !== patch.total_pages) {
            item.total_pages = patch.total_pages;
            changed = true;
          }
          if (typeof patch.processed_count === "number" && item.processed_count !== patch.processed_count) {
            item.processed_count = patch.processed_count;
            changed = true;
          }
          if (patch.updated_at && item.updated_at !== patch.updated_at) {
            item.updated_at = patch.updated_at;
            changed = true;
          }
          if (changed && !historyPanelExpanded) {
            historyDirty = true;
          }
        }

        function patchHistoryJobItem(jobId) {
          if (!jobId) return;
          if (!historyPanelExpanded) {
            historyDirty = true;
            return;
          }
          var item = null;
          for (var i = 0; i < state.historyJobs.length; i++) {
            if (state.historyJobs[i].job_id === jobId) {
              item = state.historyJobs[i];
              break;
            }
          }
          if (!item) {
            historyDirty = true;
            return;
          }
          var current = historyItemByJobId[jobId];
          if (!current || !current.parentNode) {
            historyDirty = true;
            return;
          }
          var next = renderHistoryJobItem(item);
          current.parentNode.replaceChild(next, current);
          historyItemByJobId[jobId] = next;
        }

        async function openHistoryJob(jobId) {
          if (!jobId) return;
          if (isHistoryActionBlocked()) {
            throw new Error("当前操作进行中，请稍后再打开历史任务");
          }
          resetPreparedUploadState();
          hidePdfStatusHint();
          state.job = null;
          state.jobId = jobId;
          history.replaceState(null, "", "/jobs/" + encodeURIComponent(jobId));
          setHistoryPanelExpanded(false);
          log("history opened", { job_id: jobId });
          await refreshWorkspace();
        }

        async function deleteHistoryJob(jobId) {
          if (isHistoryActionBlocked()) {
            throw new Error("当前操作进行中，请稍后再删除历史任务");
          }
          var item = state.historyJobs.find(function (entry) { return entry.job_id === jobId; });
          if (!item) throw new Error("未找到目标历史任务");
          if (!canDeleteHistoryJob(item)) {
            throw new Error("进行中的任务暂不支持删除");
          }
          if (!window.confirm("删除后将移除本地任务文件：\n" + item.pdf_name + "\n\n是否继续？")) {
            return;
          }
          await requestJson("/api/jobs/" + encodeURIComponent(jobId), { method: "DELETE" });
          if (state.jobId === jobId) {
            await resetActiveWorkspace();
          }
          await loadHistoryJobs();
          log("history deleted", { job_id: jobId, pdf_name: item.pdf_name });
        }

        function getCurrentPageIndex() {
          var currentPageNum = normalizePageNum(state.currentPageNum);
          if (currentPageNum === null) return -1;
          var index = pageIndexByNum[currentPageNum];
          return typeof index === "number" ? index : -1;
        }

        function getPageNavigationTotal() {
          if (state.pages.length > 0) {
            return state.pages.length;
          }
          if (pdfDoc && Number.isInteger(pdfDoc.numPages) && pdfDoc.numPages > 0) {
            return pdfDoc.numPages;
          }
          return 0;
        }

        function getCurrentNavigationIndex() {
          if (state.pages.length > 0) {
            var pageIndex = getCurrentPageIndex();
            return pageIndex < 0 ? 0 : pageIndex;
          }
          var total = getPageNavigationTotal();
          if (total === 0) return -1;
          var currentPageNum = normalizePageNum(state.currentPageNum);
          if (currentPageNum === null) return 0;
          return Math.min(Math.max(currentPageNum - 1, 0), total - 1);
        }

        function getPageNumForNavigationIndex(index) {
          if (state.pages.length > 0) {
            if (index < 0 || index >= state.pages.length) return null;
            return state.pages[index].page_num;
          }
          var total = getPageNavigationTotal();
          if (index < 0 || index >= total) return null;
          return index + 1;
        }

        function syncPageNavigationState() {
          var total = getPageNavigationTotal();
          if (total === 0) {
            state.currentPageNum = 1;
            els.pageSelect.value = "";
            updatePageNavButtons(-1);
            syncPdfFooterNavVisibility();
            return;
          }
          var idx = getCurrentNavigationIndex();
          var currentPageNum = getPageNumForNavigationIndex(idx);
          state.currentPageNum = currentPageNum === null ? 1 : currentPageNum;
          els.pageSelect.value = String(state.currentPageNum);
          updatePageNavButtons(idx);
          syncPdfFooterNavVisibility();
        }

        function setPageSelectOptionText(option, pageNum, status) {
          if (typeof status === "string" && status.length > 0) {
            option.textContent = "第 " + pageNum + " 页 (" + status + ")";
            return;
          }
          option.textContent = "第 " + pageNum + " 页";
        }

        function patchPageSelectOption(pageNum) {
          var normalizedPageNum = normalizePageNum(pageNum);
          if (normalizedPageNum === null) return;
          var index = pageIndexByNum[normalizedPageNum];
          var option = pageOptionByNum[normalizedPageNum];
          if (typeof index !== "number" || !option) {
            updatePageSelect();
            return;
          }
          setPageSelectOptionText(option, normalizedPageNum, state.pages[index].status);
        }

        function syncPdfFooterNavVisibility() {
          var total = getPageNavigationTotal();
          if (!els.pdfFooterNav) return;
          if (total <= 0) {
            els.pdfFooterNav.style.display = "none";
            return;
          }
          els.pdfFooterNav.style.display = "";
          els.pdfFooterNav.classList.remove("sr-only");
          els.pdfFooterNav.removeAttribute("aria-hidden");
        }

        function updatePageSelect() {
          pageOptionByNum = Object.create(null);
          els.pageSelect.innerHTML = "";
          if (state.pages.length > 0) {
            for (var i = 0; i < state.pages.length; i++) {
              var item = state.pages[i];
              var option = document.createElement("option");
              option.value = String(item.page_num);
              setPageSelectOptionText(option, item.page_num, item.status);
              pageOptionByNum[item.page_num] = option;
              els.pageSelect.appendChild(option);
            }
          } else {
            var total = getPageNavigationTotal();
            for (var pageNum = 1; pageNum <= total; pageNum++) {
              var fallbackOption = document.createElement("option");
              fallbackOption.value = String(pageNum);
              setPageSelectOptionText(fallbackOption, pageNum);
              pageOptionByNum[pageNum] = fallbackOption;
              els.pageSelect.appendChild(fallbackOption);
            }
          }
          syncPageNavigationState();
        }

        function updatePageNavButtons(currentIndex) {
          var total = getPageNavigationTotal();
          if (total === 0) {
            els.prevPageBtn.disabled = true;
            els.nextPageBtn.disabled = true;
            return;
          }
          var idx = typeof currentIndex === "number" ? currentIndex : getCurrentNavigationIndex();
          if (idx < 0) {
            idx = 0;
          }
          els.prevPageBtn.disabled = idx <= 0;
          els.nextPageBtn.disabled = idx >= total - 1;
        }

        function updatePageStatusIndicator() {
          var status = state.currentPage ? state.currentPage.status : "pending";
          /* 页面状态由顶栏与进度条传达，编辑器上方不再占行显示 ◆ / ✕ */
          els.pageStatusIndicator.className = "page-status-bar page-status-inline status-" + status + " hidden";
          if (!els.pageStatusText || !els.pageStatusText.classList) return;
          els.pageStatusText.classList.remove("blink");
          els.pageStatusText.textContent = "";
        }

        /* ── Config ───────────────────────────── */
        function applyConfigToForm(config) {
          ensureModelOption(config.model.name);
          els.modelName.value = config.model.name;
          els.timeout.value = String(config.model.timeout);
          els.dpi.value = String(config.extract.dpi);
          els.concurrency.value = String(config.extract.concurrency);
          els.maxRetries.value = String(config.extract.max_retries);
          els.prompt.value = config.extract.prompt;
          els.apiKey.value = "";
          updateHasKeyBadge(config.has_api_key);
        }

        async function loadConfig() {
          var config = await requestJson("/api/config");
          applyConfigToForm(config);
          log("config loaded", { has_api_key: config.has_api_key });
        }

        function ensureModelOption(name) {
          if (!name) return;
          var select = els.modelName;
          for (var i = 0; i < select.options.length; i++) {
            if (select.options[i].value === name) return;
          }
          var option = document.createElement("option");
          option.value = name;
          option.textContent = name;
          select.appendChild(option);
        }

        function collectConfigPayload() {
          var payload = {
            model: {
              name: els.modelName.value,
              timeout: Number(els.timeout.value),
            },
            extract: {
              dpi: Number(els.dpi.value),
              concurrency: Number(els.concurrency.value),
              max_retries: Number(els.maxRetries.value),
              prompt: els.prompt.value,
            },
          };
          var apiKey = els.apiKey.value.trim();
          if (apiKey) payload.api_key = apiKey;
          return payload;
        }

        function updateConfigUi(updated) {
          applyConfigToForm(updated);
        }

        async function persistConfig() {
          var updated = await requestJson("/api/config", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(collectConfigPayload()),
          });
          updateConfigUi(updated);
          return updated;
        }

        async function restoreInitialConfig() {
          var restored = await requestJson("/api/config/reset", {
            method: "POST",
          });
          updateConfigUi(restored);
          setConfigTestStatus("", "");
          log("config restored to defaults", { has_api_key: restored.has_api_key });
          return restored;
        }

        function setConfigTestStatus(kind, message) {
          els.configTestStatus.textContent = message || "";
          var className = "config-test-status";
          if (kind === "success") className += " is-success";
          if (kind === "error") className += " is-error";
          if (kind === "pending") className += " is-pending";
          els.configTestStatus.className = className;
        }

        async function saveConfig(event) {
          event.preventDefault();
          var updated = await persistConfig();
          log("config updated", { has_api_key: updated.has_api_key });
        }

        async function testConfigConnection() {
          setConfigTestStatus("pending", "正在保存并测试连接...");
          state.isBusy = true;
          updateControlAvailability();
          try {
            var updated = await persistConfig();
            log("config updated", { has_api_key: updated.has_api_key });
            var result = await requestJson("/api/config/test-connection", {
              method: "POST",
            });
            var statusText = result.message;
            if (result.reply_preview) {
              statusText = statusText + "：" + result.reply_preview;
            }
            setConfigTestStatus(result.ok ? "success" : "error", statusText);
            log("config connection tested", { ok: result.ok });
          } catch (error) {
            setConfigTestStatus("error", String(error));
            throw error;
          } finally {
            state.isBusy = false;
            updateControlAvailability();
          }
        }

        function updateHasKeyBadge(hasKey) {
          els.configHasKey.textContent = hasKey ? "API Key 已配置" : "API Key 未设置";
          els.configHasKey.className = hasKey ? "has-key-badge" : "has-key-badge no-key";
        }

        /* ── Job Creation ─────────────────────── */
        async function prepareFileForExtraction(file) {
          if (!file) return;
          if (state.pendingUpload || state.previewLoading) {
            throw new Error("当前 PDF 正在处理中，请稍后再试");
          }
          cancelPendingPageSave();
          closeStream();
          history.replaceState(null, "", "/");
          state.jobId = null;
          state.job = null;
          resetPreparedUploadState();
          state.preparedFile = file;
          state.previewLoading = true;
          resetEditors();
          updateControlAvailability();
          showPdfStatusHint("正在载入本地 PDF 预览...", "empty-overlay");
          try {
            await previewLocalPdf(file);
            state.previewReady = true;
            hidePdfStatusHint();
            log("local preview ready", { file_name: file.name || "source.pdf" });
          } catch (error) {
            resetPreparedUploadState();
            revokeLocalPreviewUrl();
            resetEditors();
            showPdfStatusHint("PDF 预览加载失败，请重新选择文件。", "toast");
            throw error;
          } finally {
            state.previewLoading = false;
            updateControlAvailability();
          }
        }

        async function runSinglePageTestForPreparedFile() {
          if (!state.preparedFile) throw new Error("请先选择 PDF 文件");
          if (!state.previewReady) throw new Error("PDF 预览尚未加载完成");
          if (state.jobId || state.job) throw new Error("当前已有活跃任务");
          if (state.singlePageTest && state.singlePageTest.status === "running") {
            throw new Error("单页测试正在进行中");
          }
          var snapshotPageNum = Number.isInteger(state.currentPageNum) && state.currentPageNum > 0
            ? state.currentPageNum
            : 1;
          state.singlePageTest = {
            status: "running",
            pageNum: snapshotPageNum,
            content: null,
            error: null,
          };
          updateControlAvailability();
          var formData = new FormData();
          formData.append("file", state.preparedFile, state.preparedFile.name || "source.pdf");
          formData.append("page_num", String(snapshotPageNum));
          try {
            var result = await requestJson("/api/extraction/single-page-preview", {
              method: "POST",
              body: formData,
            });
            state.singlePageTest = {
              status: "done",
              pageNum: snapshotPageNum,
              content: typeof result.content === "string" ? result.content : "",
              error: null,
            };
            log("single-page test done", { page_num: snapshotPageNum });
          } catch (error) {
            var code = "";
            var message = "";
            if (error && typeof error === "object" && error.appError) {
              code = typeof error.appError.code === "string" ? error.appError.code : "";
              message = typeof error.appError.message === "string"
                ? error.appError.message
                : String(error.message || error);
            } else {
              message = error && error.message ? String(error.message) : String(error);
            }
            state.singlePageTest = {
              status: "failed",
              pageNum: snapshotPageNum,
              content: null,
              error: { code: code || "UNEXPECTED_ERROR", message: message || "单页测试失败" },
            };
            log("single-page test failed", { page_num: snapshotPageNum, code: code });
          } finally {
            updateControlAvailability();
          }
        }

        async function startExtractionForPreparedFile() {
          if (!state.preparedFile) throw new Error("请先选择 PDF 文件");
          if (!state.previewReady) throw new Error("PDF 预览尚未加载完成");
          if (state.jobId || state.job) throw new Error("当前已有活跃任务");
          var preserveExistingPdf = hasLocalPdfPreviewLoaded();
          state.pendingUpload = true;
          updateControlAvailability();
          showPdfStatusHint("正在上传 PDF 并创建任务...", "toast");
          var formData = new FormData();
          formData.append("file", state.preparedFile, state.preparedFile.name || "source.pdf");
          try {
            var result = await requestJson("/api/jobs", { method: "POST", body: formData });
            state.jobId = result.job_id;
            state.job = {
              job_id: result.job_id,
              status: result.status,
              total_pages: result.total_pages,
              succeeded_pages: [],
              failed_pages: [],
              processed_count: 0,
            };
            resetPreparedUploadState();
            history.replaceState(null, "", "/jobs/" + encodeURIComponent(result.job_id));
            log("job created", result);
            showPdfStatusHint("任务已创建，正在同步工作区...", "toast");
            await refreshWorkspace({ preserveExistingPdf: preserveExistingPdf });
          } finally {
            state.pendingUpload = false;
            hidePdfStatusHint();
            updateControlAvailability();
          }
        }

        /* ── Page Operations ──────────────────── */
        async function loadCurrentPage(targetPageNum) {
          var pageNum = normalizePageNum(
            typeof targetPageNum === "undefined" ? state.currentPageNum : targetPageNum
          );
          if (!state.jobId || pageNum === null) return;
          var snapshotJobId = state.jobId;
          var page = await requestJson(
            "/api/jobs/" + encodeURIComponent(snapshotJobId) + "/pages/" + pageNum
          );
          if (state.jobId !== snapshotJobId || state.currentPageNum !== pageNum) {
            return;
          }
          state.currentPage = page;
          els.pageEditor.value = state.currentPage.content || "";
          els.pageError.textContent = state.currentPage.error || "";
          if (typeof rememberPageLineFromContent === "function") {
            rememberPageLineFromContent(pageNum, state.currentPage.content || "");
          }
          updatePageStatusIndicator();
          updateControlAvailability();
        }

        async function loadPages() {
          if (!state.jobId) return;
          replacePageSummaries(
            await requestJson("/api/jobs/" + encodeURIComponent(state.jobId) + "/pages")
          );
          updatePageSelect();
          if (state.pages.length > 0) {
            await loadCurrentPage();
          } else {
            state.currentPage = null;
            els.pageEditor.value = "";
            els.pageError.textContent = "";
            updatePageStatusIndicator();
          }
          if (typeof hydratePageListSummaries === "function") {
            await hydratePageListSummaries();
          }
        }

        /* ── Output Operations ────────────────── */
        async function loadOutput() {
          if (!state.jobId) return;
          state.output = await requestJson("/api/jobs/" + encodeURIComponent(state.jobId) + "/output");
          els.outputEditor.value = state.output.content || "";
          els.outputDownloadLink.href = "/api/jobs/" + encodeURIComponent(state.jobId) + "/output/download";
        }

        /* ── Workspace Refresh ────────────────── */
        async function refreshWorkspace(options) {
          if (!state.jobId) return;
          var opts = options || {};
          var preserveExistingPdf = !!opts.preserveExistingPdf;
          closeStream();
          state.job = await requestJson("/api/jobs/" + encodeURIComponent(state.jobId));
          updateControlAvailability();

          if (state.job.status === "building") {
            state.isBusy = true;
            updateControlAvailability();
            var attempts = 0;
            while (attempts < 60 && state.job.status === "building") {
              await new Promise(function (resolve) { setTimeout(resolve, 300); });
              state.job = await requestJson("/api/jobs/" + encodeURIComponent(state.jobId));
              attempts += 1;
            }
            state.isBusy = false;
            updateControlAvailability();
          }

          if (state.job.status === "ready") {
            await loadOutput();
          } else {
            clearOutputState();
            await loadPages();
            if (state.job.status === "extracting") {
              connectStream();
            }
          }

          await syncHistoryPanelOnDemand(true);
          var sourcePdfUrl = "/api/jobs/" + encodeURIComponent(state.jobId) + "/source";
          var shouldPreserveExistingPdf = preserveExistingPdf && hasLocalPdfPreviewLoaded();
          if (!shouldPreserveExistingPdf) {
            showPdfStatusHint("正在载入 PDF 预览...", "empty-overlay");
            await loadPdfDocument(sourcePdfUrl);
            hidePdfStatusHint();
          }
          updateControlAvailability();
          log("workspace refreshed", { job_id: state.jobId, status: state.job.status });
        }

        /* ── SSE Stream ───────────────────────── */
        function updateJobProgressFromPageEvent(event) {
          if (!state.job) return;
          state.job.processed_count = event.processed_count;
          state.job.total_pages = event.total_pages;
          state.job.succeeded_pages = Array.from(jobDonePageSet).sort(function (a, b) { return a - b; });
          state.job.failed_pages = Array.from(jobFailedPageSet).sort(function (a, b) { return a - b; });
          updateCurrentHistoryJobState({
            status: state.job.status,
            processed_count: event.processed_count,
            total_pages: event.total_pages,
            updated_at: new Date().toISOString(),
          });
        }

        function schedulePageEventUiFlush(patch) {
          if (!pendingUiFlush) {
            pendingUiFlush = { pageNums: new Set(), historyJobIds: new Set() };
          }
          if (patch && Array.isArray(patch.pageNums)) {
            for (var i = 0; i < patch.pageNums.length; i++) {
              var pageNum = normalizePageNum(patch.pageNums[i]);
              if (pageNum !== null) pendingUiFlush.pageNums.add(pageNum);
            }
          }
          if (patch && Array.isArray(patch.historyJobIds)) {
            for (var j = 0; j < patch.historyJobIds.length; j++) {
              var jobId = patch.historyJobIds[j];
              if (jobId) pendingUiFlush.historyJobIds.add(jobId);
            }
          }
          if (pendingUiFrameId !== null) return;
          if (!window.requestAnimationFrame) {
            flushPageEventUi();
            return;
          }
          pendingUiFrameId = window.requestAnimationFrame(function () {
            flushPageEventUi();
          });
        }

        function flushPageEventUi() {
          pendingUiFrameId = null;
          if (!pendingUiFlush) return;
          var patch = pendingUiFlush;
          pendingUiFlush = null;
          patch.pageNums.forEach(function (pageNum) {
            patchPageSelectOption(pageNum);
          });
          if (patch.pageNums.size > 0) {
            syncPageNavigationState();
          }
          if (patch.historyJobIds.size > 0) {
            if (!historyPanelExpanded) {
              historyDirty = true;
            } else {
              patch.historyJobIds.forEach(function (jobId) {
                patchHistoryJobItem(jobId);
              });
            }
          }
        }

        function shouldReloadCurrentPageFromPageEvent(pageNum, previousStatus, nextStatus) {
          if (pageNum !== state.currentPageNum) return false;
          if (nextStatus !== "done" && nextStatus !== "failed") return false;
          if (!state.currentPage || state.currentPage.page_num !== pageNum) return true;
          return previousStatus !== nextStatus || state.currentPage.status !== nextStatus;
        }

        function applyCurrentPageStatusFromEvent(pageNum, status) {
          if (pageNum !== state.currentPageNum) return;
          if (!state.currentPage || state.currentPage.page_num !== pageNum) {
            state.currentPage = {
              page_num: pageNum,
              status: status,
              content: "",
              error: "",
            };
          } else {
            state.currentPage.status = status;
            if (status !== "failed") {
              state.currentPage.error = "";
            }
          }
          updatePageStatusIndicator();
        }

        async function onStreamEvent(payload) {
          if (!state.job) return;
          if (payload.type === "page") {
            var eventPageNum = normalizePageNum(payload.page_num);
            if (eventPageNum === null) {
              log("sse page ignored", { page_num: payload.page_num });
              return;
            }
            var pageDelta = applyPageSummaryDelta(eventPageNum, payload.status);
            var shouldReloadCurrentPage = shouldReloadCurrentPageFromPageEvent(
              eventPageNum,
              pageDelta.previousStatus,
              payload.status
            );
            updateJobProgressFromPageEvent(payload);
            schedulePageEventUiFlush({
              pageNums: pageDelta.changed ? [eventPageNum] : [],
              historyJobIds: state.jobId ? [state.jobId] : [],
            });
            updateProgress();
            if (eventPageNum === state.currentPageNum) {
              applyCurrentPageStatusFromEvent(eventPageNum, payload.status);
              updateControlAvailability();
              if (shouldReloadCurrentPage) {
                await loadCurrentPage();
              }
            } else if (
              (payload.status === "done" || payload.status === "failed")
              && typeof fetchPageSummarySnippet === "function"
            ) {
              void fetchPageSummarySnippet(eventPageNum);
            }
            log("sse page", payload);
            return;
          }
          if (payload.type === "complete") {
            state.job.status = "extracted";
            state.job.processed_count = payload.processed_count;
            state.job.total_pages = payload.total_pages;
            state.job.succeeded_pages = payload.succeeded_pages.slice();
            state.job.failed_pages = payload.failed_pages.slice();
            updateCurrentHistoryJobState({
              status: state.job.status,
              processed_count: payload.processed_count,
              total_pages: payload.total_pages,
              updated_at: new Date().toISOString(),
            });
            schedulePageEventUiFlush({
              historyJobIds: state.jobId ? [state.jobId] : [],
            });
            closeStream();
            updateControlAvailability();
            log("sse complete", payload);
            return;
          }
          if (payload.type === "failed") {
            state.job.status = "failed";
            updateCurrentHistoryJobState({
              status: state.job.status,
              processed_count: state.job.processed_count,
              total_pages: state.job.total_pages,
              updated_at: new Date().toISOString(),
            });
            schedulePageEventUiFlush({
              historyJobIds: state.jobId ? [state.jobId] : [],
            });
            closeStream();
            updateControlAvailability();
            log("sse failed", payload);
          }
        }

        function connectStream() {
          if (!state.jobId) return;
          closeStream();
          var source = new EventSource("/api/jobs/" + encodeURIComponent(state.jobId) + "/stream");
          source.onmessage = async function (event) {
            try {
              var payload = JSON.parse(event.data);
              await onStreamEvent(payload);
            } catch (error) {
              log("sse parse error", { message: String(error) });
            }
          };
          source.onerror = function () { log("sse error"); };
          state.stream = source;
          log("sse connected", { job_id: state.jobId });
        }

        /* ── Page Save / Retry ────────────────── */
        function applySavedPage(saved) {
          var pageNum = normalizePageNum(saved && saved.page_num);
          if (pageNum === null) return;
          var savedPage = {
            page_num: pageNum,
            status: saved.status,
            content: typeof saved.content === "string" ? saved.content : "",
            error: typeof saved.error === "string" ? saved.error : "",
          };
          if (state.currentPageNum === pageNum) {
            state.currentPage = savedPage;
          }
          if (state.currentPageNum === pageNum) {
            els.pageEditor.value = state.currentPage.content;
            els.pageError.textContent = state.currentPage.error;
          }
          if (typeof applyPageSummaryDelta === "function") {
            applyPageSummaryDelta(pageNum, saved.status);
          } else {
            var idx = state.pages.findIndex(function (item) { return item.page_num === pageNum; });
            if (idx >= 0) {
              state.pages[idx] = { page_num: pageNum, status: saved.status };
            } else {
              state.pages.push({ page_num: pageNum, status: saved.status });
              state.pages.sort(function (a, b) { return a.page_num - b.page_num; });
            }
          }
          if (state.job) {
            if (typeof jobDonePageSet !== "undefined" && typeof jobFailedPageSet !== "undefined") {
              state.job.succeeded_pages = Array.from(jobDonePageSet).sort(function (a, b) { return a - b; });
              state.job.failed_pages = Array.from(jobFailedPageSet).sort(function (a, b) { return a - b; });
            } else {
              var done = [];
              var failed = [];
              for (var i = 0; i < state.pages.length; i++) {
                if (state.pages[i].status === "done") done.push(state.pages[i].page_num);
                else if (state.pages[i].status === "failed") failed.push(state.pages[i].page_num);
              }
              state.job.succeeded_pages = done;
              state.job.failed_pages = failed;
            }
            var processed = state.job.succeeded_pages.length + state.job.failed_pages.length;
            state.job.processed_count = processed;
            // 与后端 save_page / 领域规则对齐：EXTRACTING 下仅当全部页终态且无失败页时才跃迁为 EXTRACTED。
            // 后端不会把 EXTRACTED 降级回 EXTRACTING，因此此处同样保持单调（不向 extracting 回退）。
            if (
              state.job.status === "extracting" &&
              typeof state.job.total_pages === "number" &&
              processed === state.job.total_pages &&
              (!state.job.failed_pages || state.job.failed_pages.length === 0)
            ) {
              state.job.status = "extracted";
            }
          }
          var updatedAt = new Date().toISOString();
          var historyPatch = { updated_at: updatedAt };
          if (state.job) {
            historyPatch.status = state.job.status;
            historyPatch.processed_count = state.job.processed_count;
            historyPatch.total_pages = state.job.total_pages;
          }
          updateCurrentHistoryJobState(historyPatch);
          if (state.jobId) {
            schedulePageEventUiFlush({
              historyJobIds: [state.jobId],
            });
          }
          if (state.currentPageNum === pageNum) {
            updatePageStatusIndicator();
          }
          if (typeof rememberPageLineFromContent === "function") {
            rememberPageLineFromContent(pageNum, savedPage.content || "");
          }
          if (typeof patchPageSelectOption === "function") {
            patchPageSelectOption(pageNum);
            syncPageNavigationState();
          } else {
            updatePageSelect();
          }
          updateControlAvailability();
        }

        async function saveCurrentPage() {
          if (!state.jobId) throw new Error("没有活跃任务");
          var content = els.pageEditor.value;
          var saved = await requestJson(
            "/api/jobs/" + encodeURIComponent(state.jobId) + "/pages/" + state.currentPageNum,
            { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ content: content }) }
          );
          applySavedPage(saved);
          log("page saved", saved);
        }

        function applyRetriedPageToWorkspaceState(pageNum) {
          var retryDelta = applyPageSummaryDelta(pageNum, "extracting");
          if (state.pageListSummaryByNum) {
            delete state.pageListSummaryByNum[pageNum];
          }
          if (state.currentPageNum === pageNum) {
            if (!state.currentPage || state.currentPage.page_num !== pageNum) {
              state.currentPage = {
                page_num: pageNum,
                status: "extracting",
                content: "",
                error: "",
              };
            } else {
              state.currentPage.status = "extracting";
              state.currentPage.content = "";
              state.currentPage.error = "";
            }
            els.pageEditor.value = "";
            els.pageError.textContent = "";
            updatePageStatusIndicator();
          }
          if (state.job) {
            state.job.status = "extracting";
            state.job.succeeded_pages = Array.from(jobDonePageSet).sort(function (a, b) { return a - b; });
            state.job.failed_pages = Array.from(jobFailedPageSet).sort(function (a, b) { return a - b; });
            state.job.processed_count = state.job.succeeded_pages.length + state.job.failed_pages.length;
            updateCurrentHistoryJobState({
              status: state.job.status,
              processed_count: state.job.processed_count,
              total_pages: state.job.total_pages,
              updated_at: new Date().toISOString(),
            });
          }
          if (state.jobId) {
            schedulePageEventUiFlush({
              pageNums: retryDelta.changed ? [pageNum] : [],
              historyJobIds: [state.jobId],
            });
          }
          updateProgress();
        }

        async function retryCurrentPage() {
          if (!state.jobId) throw new Error("没有活跃任务");
          if (!state.job) throw new Error("没有活跃任务");
          var workspaceStatus = getWorkspaceStatus();
          if (workspaceStatus !== "extracting" && workspaceStatus !== "extracted") {
            throw new Error("当前任务状态不支持重新提取");
          }
          var currentPageNum = Number(state.currentPageNum);
          if (!Number.isInteger(currentPageNum) || currentPageNum <= 0) {
            throw new Error("当前页码无效");
          }
          var currentPageStatus = "";
          for (var pageStatusIndex = 0; pageStatusIndex < state.pages.length; pageStatusIndex++) {
            var pageSummary = state.pages[pageStatusIndex];
            if (pageSummary && pageSummary.page_num === currentPageNum) {
              currentPageStatus = pageSummary.status;
              break;
            }
          }
          if (!currentPageStatus && state.currentPage && state.currentPage.page_num === currentPageNum) {
            currentPageStatus = state.currentPage.status;
          }
          if (currentPageStatus !== "done" && currentPageStatus !== "failed") {
            throw new Error("当前页尚未完成首次提取，暂不可重新提取");
          }
          var preserveExistingPdf = hasLocalPdfPreviewLoaded();
          var shouldApplyRetryLocally = workspaceStatus === "extracting" && !!state.stream;
          state.isBusy = true;
          updateControlAvailability();
          try {
            var retried = await requestJson(
              "/api/jobs/" + encodeURIComponent(state.jobId) + "/pages/" + currentPageNum + "/retry",
              { method: "POST" }
            );
            log("page retried", retried);
            if (shouldApplyRetryLocally) {
              applyRetriedPageToWorkspaceState(currentPageNum);
            } else {
              await refreshWorkspace({ preserveExistingPdf: preserveExistingPdf });
            }
          } finally {
            state.isBusy = false;
            updateControlAvailability();
          }
        }

        /* ── Page Auto Save ───────────────────── */
        var pageAutoSaveTimer = null;
        var PAGE_AUTO_SAVE_DELAY_MS = 600;

        function cancelPendingPageSave() {
          if (pageAutoSaveTimer !== null) {
            window.clearTimeout(pageAutoSaveTimer);
            pageAutoSaveTimer = null;
          }
        }

        function canAutoSaveCurrentPage() {
          if (!state.jobId || !state.currentPage) return false;
          if (state.isBusy) return false;
          var status = getWorkspaceStatus();
          if (status === "building" || status === "ready") return false;
          return !els.pageEditor.disabled;
        }

        function schedulePageAutoSave() {
          if (!canAutoSaveCurrentPage()) return;
          cancelPendingPageSave();
          pageAutoSaveTimer = window.setTimeout(function () {
            pageAutoSaveTimer = null;
            runAction(saveCurrentPage);
          }, PAGE_AUTO_SAVE_DELAY_MS);
        }

        async function flushPendingPageSave() {
          if (pageAutoSaveTimer === null) return;
          cancelPendingPageSave();
          if (!canAutoSaveCurrentPage()) return;
          await saveCurrentPage();
        }

        /* ── Build / Output ───────────────────── */
        async function buildOutput(mergeMode) {
          if (!state.jobId) throw new Error("没有活跃任务");
          closeBuildOutputMenu();
          var normalizedMergeMode = normalizeBuildMergeMode(mergeMode);
          state.isBusy = true;
          updateControlAvailability();
          try {
            var result = await requestJson(
              "/api/jobs/" + encodeURIComponent(state.jobId) + "/build",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ merge_mode: normalizedMergeMode }),
              }
            );
            log("build completed", { status: result.status, merge_mode: normalizedMergeMode });
          } finally {
            state.isBusy = false;
          }
          await refreshWorkspace();
        }

        async function discardOutput() {
          if (!state.jobId) throw new Error("没有活跃任务");
          if (!window.confirm("回退后，当前文档中的修改将被丢弃，是否继续？")) {
            return;
          }
          state.isBusy = true;
          updateControlAvailability();
          try {
            var result = await requestJson(
              "/api/jobs/" + encodeURIComponent(state.jobId) + "/output/discard",
              { method: "POST" }
            );
            clearOutputState();
            log("output discarded", { status: result.status });
          } finally {
            state.isBusy = false;
          }
          await refreshWorkspace();
        }

        async function saveOutput() {
          if (!state.jobId) throw new Error("没有活跃任务");
          var result = await requestJson(
            "/api/jobs/" + encodeURIComponent(state.jobId) + "/output",
            { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ content: els.outputEditor.value }) }
          );
          if (state.output) {
            state.output.content = result.content;
            state.output.updated_at = result.updated_at;
          } else {
            state.output = result;
          }
          log("output saved", { updated_at: result.updated_at });
        }

        /* ── Output Auto Save ─────────────────── */
        var outputAutoSaveTimer = null;
        var OUTPUT_AUTO_SAVE_DELAY_MS = 600;

        function cancelPendingOutputSave() {
          if (outputAutoSaveTimer !== null) {
            window.clearTimeout(outputAutoSaveTimer);
            outputAutoSaveTimer = null;
          }
        }

        function canAutoSaveOutput() {
          if (!state.jobId) return false;
          if (state.isBusy) return false;
          if (getWorkspaceStatus() !== "ready") return false;
          return !els.outputEditor.disabled;
        }

        function scheduleOutputAutoSave() {
          if (!canAutoSaveOutput()) return;
          cancelPendingOutputSave();
          outputAutoSaveTimer = window.setTimeout(function () {
            outputAutoSaveTimer = null;
            runAction(saveOutput);
          }, OUTPUT_AUTO_SAVE_DELAY_MS);
        }

        async function flushPendingOutputSave() {
          if (outputAutoSaveTimer === null) return;
          cancelPendingOutputSave();
          if (!canAutoSaveOutput()) return;
          await saveOutput();
        }

        /* ── Page Navigation ──────────────────── */
        async function onPageSelectionChanged() {
          var nextPageNum = normalizePageNum(els.pageSelect.value);
          if (nextPageNum === null) return;
          var pendingSavePromise = flushPendingPageSave();
          state.currentPageNum = nextPageNum;
          syncPageNavigationState();
          updateControlAvailability();
          await renderPdfPage(nextPageNum);
          await pendingSavePromise;
          await loadCurrentPage(nextPageNum);
        }

        function goPrevPage() {
          var idx = getCurrentNavigationIndex();
          var prevPageNum = getPageNumForNavigationIndex(idx - 1);
          if (prevPageNum !== null) {
            els.pageSelect.value = String(prevPageNum);
            runAction(onPageSelectionChanged);
          }
        }

        function goNextPage() {
          var idx = getCurrentNavigationIndex();
          var nextPageNum = getPageNumForNavigationIndex(idx + 1);
          if (nextPageNum !== null) {
            els.pageSelect.value = String(nextPageNum);
            runAction(onPageSelectionChanged);
          }
        }

        /* ── Action Runner ────────────────────── */
        async function runAction(action) {
          try {
            await action();
          } catch (error) {
            log("action error", { message: String(error) });
          }
        }

        /* ── Panel Toggles ────────────────────── */
        els.toggleHistoryBtn.addEventListener("click", function () {
          var shouldExpand = els.historyPanel.classList.contains("collapsed");
          setHistoryPanelExpanded(shouldExpand);
          if (shouldExpand) {
            runAction(refreshHistoryPanelOnExpand);
          }
        });

        els.toggleConfigBtn.addEventListener("click", function () {
          setConfigPanelExpanded(!configPanelExpanded);
        });

        els.toggleEventsBtn.addEventListener("click", function () {
          setEventsLogExpanded(!eventsLogExpanded);
        });

        /* ── PDF Upload (button click) ────────── */
        els.uploadPdfBtn.addEventListener("click", function () {
          els.pdfFileInput.click();
        });
        els.uploadPdfHeaderBtn.addEventListener("click", function () {
          els.pdfFileInput.click();
        });
        els.pdfFileInput.addEventListener("change", function () {
          var file = els.pdfFileInput.files && els.pdfFileInput.files[0];
          if (file) {
            runAction(function () { return prepareFileForExtraction(file); });
          }
          els.pdfFileInput.value = "";
        });

        /* ── Drag & Drop ─────────────────────── */
        els.pdfDropZone.addEventListener("dragenter", function (e) {
          e.preventDefault();
        });

        els.pdfDropZone.addEventListener("dragover", function (e) {
          e.preventDefault();
          e.dataTransfer.dropEffect = "copy";
        });

        els.pdfDropZone.addEventListener("drop", function (e) {
          e.preventDefault();
          var files = e.dataTransfer && e.dataTransfer.files;
          if (files && files.length > 0) {
            var file = files[0];
            if (file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf")) {
              runAction(function () { return prepareFileForExtraction(file); });
            } else {
              log("drop error", { message: "请拖放 PDF 文件" });
            }
          }
        });

        document.addEventListener("dragover", function (e) { e.preventDefault(); });
        document.addEventListener("drop", function (e) { e.preventDefault(); });
        if (els.workspaceDivider) {
          els.workspaceDivider.addEventListener("pointerdown", function (event) {
            event.preventDefault();
            workspaceResizeActive = true;
            workspaceDividerPointerId = event.pointerId;
            workspaceResizeSession = createWorkspaceResizeSession();
            workspaceResizePendingClientX = null;
            if (workspaceResizeFrameId !== null && window.cancelAnimationFrame) {
              window.cancelAnimationFrame(workspaceResizeFrameId);
              workspaceResizeFrameId = null;
            }
            document.body.classList.add("workspace-resizing");
            if (els.workspaceDivider.setPointerCapture) {
              els.workspaceDivider.setPointerCapture(event.pointerId);
            }
            updateWorkspaceSplitFromClientX(event.clientX);
          });
          els.workspaceDivider.addEventListener("pointermove", function (event) {
            if (!workspaceResizeActive || event.pointerId !== workspaceDividerPointerId) return;
            updateWorkspaceSplitFromClientX(event.clientX);
          });
          els.workspaceDivider.addEventListener("pointerup", stopWorkspaceResize);
          els.workspaceDivider.addEventListener("pointercancel", stopWorkspaceResize);
          els.workspaceDivider.addEventListener("lostpointercapture", stopWorkspaceResize);
          els.workspaceDivider.addEventListener("keydown", function (event) {
            if (event.key === "ArrowLeft") {
              event.preventDefault();
              nudgeWorkspaceSplit(-1);
              return;
            }
            if (event.key === "ArrowRight") {
              event.preventDefault();
              nudgeWorkspaceSplit(1);
              return;
            }
            if (event.key === "Home") {
              event.preventDefault();
              workspaceSplitRatio = 0;
              applyWorkspaceSplit();
              persistWorkspaceSplitRatio();
              schedulePdfRender();
              return;
            }
            if (event.key === "End") {
              event.preventDefault();
              workspaceSplitRatio = 1;
              applyWorkspaceSplit();
              persistWorkspaceSplitRatio();
              schedulePdfRender();
            }
          });
        }

        els.headerBackHomeBtn.addEventListener("click", function () { runAction(goBackHomeFromHeader); });
        window.addEventListener("resize", function () {
          applyWorkspaceSplit();
          persistWorkspaceSplitRatio();
          schedulePdfRender();
        });

        /* ── Event Listeners ──────────────────── */
        els.configForm.addEventListener("submit", function (event) { runAction(function () { return saveConfig(event); }); });
        els.loadConfigBtn.addEventListener("click", function () { runAction(loadConfig); });
        els.restoreInitialConfigBtn.addEventListener("click", function () { runAction(restoreInitialConfig); });
        els.configTestBtn.addEventListener("click", function () { runAction(testConfigConnection); });
        els.refreshJobBtn.addEventListener("click", function () { runAction(refreshWorkspace); });
        els.historyList.addEventListener("click", function (event) {
          var target = event.target;
          var button = target && target.closest ? target.closest("[data-history-action]") : null;
          if (!button) return;
          var action = button.getAttribute("data-history-action");
          var jobId = button.getAttribute("data-job-id");
          if (action === "open") {
            runAction(function () { return openHistoryJob(jobId); });
            return;
          }
          if (action === "delete") {
            runAction(function () { return deleteHistoryJob(jobId); });
          }
        });
        els.buildOutputBtn.addEventListener("click", function (event) {
          event.stopPropagation();
          if (els.buildOutputBtn.disabled) return;
          els.outputBuildMenu.classList.toggle("hidden");
        });
        els.startExtractionBtn.addEventListener("click", function () { runAction(startExtractionForPreparedFile); });
        els.singlePageTestBtn.addEventListener("click", function () { runAction(runSinglePageTestForPreparedFile); });
        els.outputBuildMenu.addEventListener("click", function (event) {
          event.stopPropagation();
          var target = event.target;
          var button = target && target.closest ? target.closest("[data-merge-mode]") : null;
          if (!button) return;
          runAction(function () { return buildOutput(button.getAttribute("data-merge-mode")); });
        });
        document.addEventListener("click", function (event) {
          if (!els.outputBuildMenuWrap.contains(event.target)) {
            closeBuildOutputMenu();
          }
        });
        els.pageEditor.addEventListener("input", schedulePageAutoSave);
        els.pageEditor.addEventListener("blur", function () { runAction(flushPendingPageSave); });
        els.retryPageBtn.addEventListener("click", function () { runAction(retryCurrentPage); });
        els.discardOutputBtn.addEventListener("click", function () { runAction(discardOutput); });
        els.outputEditor.addEventListener("input", scheduleOutputAutoSave);
        els.outputEditor.addEventListener("blur", function () { runAction(flushPendingOutputSave); });
        els.pageSelect.addEventListener("change", function () { runAction(onPageSelectionChanged); });
        els.prevPageBtn.addEventListener("click", goPrevPage);
        els.nextPageBtn.addEventListener("click", goNextPage);

        /* ── Init from URL ────────────────────── */
        function initJobFromPath() {
          var matched = window.location.pathname.match(/^\/jobs\/([^/?#]+)\/?$/);
          if (!matched || !matched[1]) return null;
          return decodeURIComponent(matched[1]);
        }

        /* ── Global export for tests ──────────── */
        window.__pdfKnowledgeBaseApp = {
          state: state,
          refreshWorkspace: refreshWorkspace,
          loadConfig: loadConfig,
          closeStream: closeStream,
          applyWorkspaceSplit: applyWorkspaceSplit,
        };

        /* ── Bootstrap ────────────────────────── */
        runAction(async function () {
          loadPersistedWorkspaceSplitRatio();
          applyWorkspaceSplit();
          await loadConfig();
          var jobIdFromPath = initJobFromPath();
          if (jobIdFromPath) {
            state.jobId = jobIdFromPath;
            await refreshWorkspace();
          } else {
            await syncHistoryPanelOnDemand(false);
            updateControlAvailability();
          }
        });
      })();
    </script>
  </body>
</html>
