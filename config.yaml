model:
  name: "doubao-seed-2-0-lite-260215"
  timeout_seconds: 60

extract:
  dpi: 150
  concurrency: 10
  max_retries: 3
  prompt: |
    从课件图片中提取文字内容，以 Markdown 格式输出。

    1. 跳过：
       - 页码、页眉、页脚、装饰性文字
       - 仅用于举例说明的配图、案例、新闻、故事等
       - 配图中字体过小、模糊或过分繁密，导致你难以看清的图示信息
    2. 保留：跳过以上内容后，**严格**保留原文内容，不得有**任何增删、改写**
       - 所有定义、概念和知识点必须**完整**保留
    3. 格式：
       - 标题层级 → #/##/###/####
       - 页面或内容旁出现星形标记（★/☆/⭐）→ 在该段落或标题前加 ★
       - 原文中加粗、彩色或特殊标记的重点内容 → **加粗**
       - 列表 → -
       - 表格 → 标准 Markdown 表格

    直接输出内容，不加任何解释。
